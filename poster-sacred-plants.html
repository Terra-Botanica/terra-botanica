<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sacred &amp; Ceremonial Plants</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0804;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
    font-family: Georgia, 'Times New Roman', serif;
  }
  .poster-container {
    width: 800px;
    min-width: 800px;
  }
</style>
</head>
<body>
<div class="poster-container">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1130" width="800" height="1130">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f0e08"/>
      <stop offset="100%" stop-color="#180e08"/>
    </linearGradient>

    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0c08"/>
      <stop offset="100%" stop-color="#1f1008"/>
    </linearGradient>

    <!-- Border gradient (amber) -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8903a"/>
      <stop offset="50%" stop-color="#e8b060"/>
      <stop offset="100%" stop-color="#c8903a"/>
    </linearGradient>

    <!-- Title underline gradient -->
    <linearGradient id="titleLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f0e08"/>
      <stop offset="20%" stop-color="#c8903a"/>
      <stop offset="50%" stop-color="#e8b060"/>
      <stop offset="80%" stop-color="#c8903a"/>
      <stop offset="100%" stop-color="#1f0e08"/>
    </linearGradient>

    <!-- Glow filter for title -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for icons -->
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="800" height="1130" fill="url(#bgGrad)"/>

  <!-- ═══ OUTER DOUBLE BORDER ═══ -->
  <!-- Outer border -->
  <rect x="8" y="8" width="784" height="1114" rx="4" ry="4"
        fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>
  <!-- Inner border -->
  <rect x="14" y="14" width="772" height="1102" rx="3" ry="3"
        fill="none" stroke="#5a3018" stroke-width="0.8"/>

  <rect x="18" y="18" width="764" height="1094" rx="2" ry="2"
        fill="none" stroke="#3a1a08" stroke-width="0.5"/>

    <circle cx="12" cy="12" r="3" fill="#c8903a" stroke="none"/>
    <path d="M12,5 L12,9 M12,15 L12,19 M5,12 L9,12 M15,12 L19,12" stroke="#a06030" stroke-width="0.8"/>
  </g>
  <!-- Bottom-left -->

    <circle cx="12" cy="12" r="3" fill="#c8903a" stroke="none"/>
    <path d="M12,5 L12,9 M12,15 L12,19 M5,12 L9,12 M15,12 L19,12" stroke="#a06030" stroke-width="0.8"/>

  <!-- Bottom-right -->

    <path d="M5,25 L5,5 L25,5"/>
    <circle cx="12" cy="12" r="3" fill="#c8903a" stroke="none"/>
    <path d="M12,5 L12,9 M12,15 L12,19 M5,12 L9,12 M15,12 L19,12" stroke="#a06030" stroke-width="0.8"/>
  </g>

  <!-- ═══ TOP BOTANICAL / FLAME MOTIF ═══ -->
  <!-- Rising smoke / sacred flame lines — top center -->
  <g transform="translate(400, 38)" fill="none" stroke="#a06030" stroke-linecap="round" opacity="0.7">

    <path d="M0,22 C0,14 -3,8 0,2 C3,8 0,14 0,22" stroke-width="1.2" fill="#c87840" fill-opacity="0.15"/>
    <!-- left flames -->

  <!-- ═══ TITLE SECTION ═══ -->

  <text x="400" y="128" text-anchor="middle"
        font-family="Georgia, serif" font-size="30" font-weight="bold"
        letter-spacing="2" fill="#d4a853" filter="url(#glow)">Sacred &amp; Ceremonial</text>

  <text x="400" y="156" text-anchor="middle"
        font-family="Georgia, serif" font-size="36" font-weight="bold"
        letter-spacing="3" fill="#d4a853" filter="url(#glow)">PLANTS</text>

  <!-- Title decorative line -->
  <rect x="80" y="165" width="640" height="1.5" fill="url(#titleLine)" rx="1"/>
  <rect x="140" y="169" width="520" height="0.8" fill="url(#titleLine)" rx="0.5" opacity="0.5"/>

  <text x="400" y="184" text-anchor="middle"

        letter-spacing="5" fill="#c89040" opacity="0.85">PLANTS OF HEALING TRADITIONS</text>

  <!-- ═══ GRID OF 12 PLANT CARDS ═══ -->
  <!-- Grid: 3 columns × 4 rows, cards 240px wide × 218px tall -->
  <!-- col x: 28, 282, 536   row y: 196, 420, 644, 868 -->

  <!-- ────────────────────────────────────────────────
       CARD MACRO — repeated 12 times
       Each card: rx=6, border #5a3018
       Layout inside card (relative to card top-left):
         circle icon: cx=34, cy=34, r=26 (with border #5a3018)
         plant name: x=70, y=18
         botanical: x=70, y=30
         divider: y≈42
         TRADITION label + text
         CEREMONY label + text
         PROPERTIES label + text
         SPIRITUAL label + text (italic)
  ──────────────────────────────────────────────────── -->

  <!-- ══════ ROW 1 ══════ -->

  <!-- CARD 1: White Sage -->
  <g transform="translate(28, 196)">
    <rect width="238" height="196" rx="6" fill="url(#cardGrad)" stroke="#5a3018" stroke-width="1"/>

    <text x="70" y="31" font-family="Georgia,serif" font-size="8" font-style="italic" fill="#a07838">Salvia apiana</text>

    <text x="8" y="135" font-family="Georgia,serif" font-size="6.5" font-weight="bold" letter-spacing="1.5" fill="#c89040">PROPERTIES</text>

    <text x="8" y="188" font-family="Georgia,serif" font-size="7" font-style="italic" fill="#9a7040">negative energy</text>
  </g>

    <text x="8" y="188" font-family="Georgia,serif" font-size="7" font-style="italic" fill="#9a7040">knowledge and healing</text>
  </g>

  <!-- CARD 5: Peyote -->
