    purpose: "Tap gently into skin several times daily for shingles pain, itching and healing.",
    uses: ["Shingles","Postherpetic neuralgia","Nerve pain","Blistering skin"],
    methods: "Tap gently into skin several times daily. Use lavender hydrolat spray (with mint or eucalyptus drops) for itching relief."
  }
];

// State
let selectedCat = 'all';
let selectedOil = null;
let searchTerm = '';

function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = oils.filter(oil => {
    const matchCat = selectedCat === 'all' || oil.categories.includes(selectedCat);
    const q = searchTerm.toLowerCase();
    const matchSearch = !q ||
      oil.name.toLowerCase().includes(q) ||
      (oil.botanical && oil.botanical.toLowerCase().includes(q)) ||
      oil.uses.some(u => u.toLowerCase().includes(q)) ||
      oil.properties.some(p => p.toLowerCase().includes(q)) ||
      (oil.emotional && oil.emotional.toLowerCase().includes(q));
    return matchCat && matchSearch;
  });

  document.getElementById('result-count').textContent = `${filtered.length} oil${filtered.length !== 1 ? 's' : ''} found`;

  grid.innerHTML = filtered.map(oil => `
    <div class="card ${selectedOil === oil.name ? 'selected' : ''}" onclick="selectOil('${oil.name}')">
      <div class="card-name">${oil.name}</div>
      ${oil.botanical ? `<div class="card-botanical">${oil.botanical}</div>` : ''}
      <div class="card-tags">
        ${oil.categories.map(c => `<span class="tag ${c}">${c}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

function renderBlends() {
  const grid = document.getElementById('blends-grid');
  const q = searchTerm.toLowerCase();
  const filtered = blends.filter(b => !q ||
    b.name.toLowerCase().includes(q) ||
    b.purpose.toLowerCase().includes(q) ||
    b.oils.toLowerCase().includes(q) ||
    b.uses.some(u => u.toLowerCase().includes(q)));

  grid.innerHTML = filtered.map(blend => `
    <div class="blend-card">
      <h3>${blend.name}</h3>
      <div class="oils">${blend.oils}</div>
      <div class="purpose">${blend.purpose}</div>
      ${blend.methods ? `<div style="margin-top:6px;font-size:0.8rem;color:#8a7060"><strong>How to use:</strong> ${blend.methods}</div>` : ''}
    </div>
  `).join('');
}

function selectOil(name) {
  selectedOil = name;
  const oil = oils.find(o => o.name === name);
  renderGrid();

  const panel = document.getElementById('detail');
  panel.classList.add('open');

  panel.innerHTML = `
    <button class="close-btn" onclick="closeDetail()">✕</button>
    <div class="detail-name">${oil.name}</div>
    ${oil.botanical ? `<div class="detail-botanical">${oil.botanical}</div>` : ''}
    <div class="card-tags" style="margin-bottom:12px">
      ${oil.categories.map(c => `<span class="tag ${c}">${c}</span>`).join('')}
    </div>

    ${oil.keyCompound ? `
      <div style="background:#e8f4fe;border-left:3px solid #2563a8;padding:8px 12px;border-radius:4px;font-size:0.82rem;color:#1a3a5a;margin-bottom:12px">
        <strong>Key compound:</strong> ${oil.keyCompound}
      </div>` : ''}

    <div class="section-title">Properties</div>
    <ul class="prop-list">${oil.properties.map(p => `<li>${p}</li>`).join('')}</ul>

    <div class="section-title">Uses &amp; Benefits</div>
    <ul class="prop-list">${oil.uses.map(u => `<li>${u}</li>`).join('')}</ul>

    ${oil.emotional ? `
      <div class="section-title">Emotional &amp; Mental</div>
      <p style="font-size:0.83rem;color:#4a3a2a;line-height:1.5">${oil.emotional}</p>
    ` : ''}

    ${oil.methods && oil.methods.length ? `
      <div class="section-title">How to Use</div>
      <ul class="prop-list">${oil.methods.map(m => `<li>${m}</li>`).join('')}</ul>
    ` : ''}

    ${oil.combinations && oil.combinations.length ? `
      <div class="section-title">Blends Well With</div>
      ${oil.combinations.map(c => `
        <div class="combo-item">
          <strong>${c.oils}</strong>
          <span>${c.purpose}</span>
        </div>
      `).join('')}
    ` : ''}

    ${oil.cautions ? `
      <div class="section-title">Cautions</div>
      <div class="caution">${oil.cautions}</div>
    ` : ''}

    ${oil.fiveElements ? `
      <div class="section-title">Traditional Classification</div>
      <p style="font-size:0.82rem;color:#6a5545">${oil.fiveElements}</p>
    ` : ''}
  `;
}

function closeDetail() {
  selectedOil = null;
  document.getElementById('detail').classList.remove('open');
  document.getElementById('detail').innerHTML = `
    <div class="empty">
      <div class="icon">🌿</div>
      <p>Select an oil to see details</p>
    </div>
  `;
  renderGrid();
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  if (tab === 'oils') {
    document.getElementById('oils-tab').style.display = 'block';
    document.getElementById('combos-tab').style.display = 'none';
  } else {
    document.getElementById('oils-tab').style.display = 'none';
    document.getElementById('combos-tab').style.display = 'block';
    renderBlends();
  }
}

// Filters
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selectedCat = chip.dataset.cat;
    renderGrid();
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  renderGrid();
  if (document.getElementById('combos-tab').style.display === 'block') renderBlends();
});

// Init
renderGrid();
</script>
</body>
</html>
